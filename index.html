<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Sports Clock</title>

  <!-- Favicon: reloj deportivo -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23007AFF'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='white' stroke-width='1.5' opacity='.35'/%3E%3Cline x1='16' y1='16' x2='16' y2='7' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='22' y2='19' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='2.2' fill='white'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── VARIABLES ───────────────────────────────────── */
    :root {
      --bg:            #F2F2F7;
      --bg2:           #E5E5EA;
      --card:          #FFFFFF;
      --blue:          #007AFF;
      --blue-soft:     rgba(0,122,255,0.10);
      --green:         #34C759;
      --red:           #FF3B30;
      --yellow:        #FFD60A;
      --primary-text:  #1C1C1E;
      --secondary-text:#8E8E93;
      --tertiary-text: #C7C7CC;
      --separator:     rgba(60,60,67,0.12);
      --shadow-sm:     0 1px 8px rgba(0,0,0,0.07);
      --shadow:        0 4px 20px rgba(0,0,0,0.09);
      --shadow-lg:     0 8px 40px rgba(0,0,0,0.16);
      --radius:        18px;
      --radius-sm:     12px;
      --sidebar-w:     260px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #000;
        --bg2:           #1C1C1E;
        --card:          #1C1C1E;
        --primary-text:  #FFF;
        --secondary-text:#8E8E93;
        --tertiary-text: #48484A;
        --separator:     rgba(84,84,88,0.36);
        --shadow-sm:     0 1px 8px rgba(0,0,0,0.3);
        --shadow:        0 4px 20px rgba(0,0,0,0.4);
        --shadow-lg:     0 8px 40px rgba(0,0,0,0.6);
      }
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { -webkit-text-size-adjust:none; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--primary-text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── APP LAYOUT ──────────────────────────────────── */
    .app-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── CONTENT AREA ────────────────────────────────── */
    .content-area {
      padding-bottom: 100px; /* space for fixed tab bar */
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      padding: 54px 20px 0;
      background: var(--bg);
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .app-name { font-size: 34px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .app-date  { font-size: 14px; color: var(--secondary-text); font-weight: 500; margin-top: 4px; }
    .icon-btn {
      width: 38px; height: 38px; background: var(--card); border: none;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; box-shadow: var(--shadow-sm); flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    .icon-btn:active { transform: scale(.92); opacity: .8; }

    /* ── PILLS ───────────────────────────────────────── */
    .pills-wrap {
      display: flex;
      align-items: center;
    }
    .pills-track {
      flex: 1;
      display: flex; gap: 8px; padding: 8px 12px 12px 20px;
      overflow-x: auto; scrollbar-width: none;
    }
    .pills-track::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0; padding: 7px 16px; border-radius: 100px; border: none;
      background: var(--card); color: var(--secondary-text);
      font-size: 13px; font-weight: 600; cursor: pointer;
      box-shadow: var(--shadow-sm); transition: all .2s; white-space: nowrap;
    }
    .pill.on { background: var(--blue); color: #fff; }
    .pill.pinned { box-shadow: var(--shadow-sm), inset 0 0 0 1.5px var(--blue); }
    .pill.pinned.on { box-shadow: none; }

    .league-edit-btn {
      flex-shrink: 0; margin-right: 16px; padding: 5px 10px;
      background: none; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; color: var(--secondary-text);
      border-radius: 8px; transition: background .15s; white-space: nowrap;
    }
    .league-edit-btn:hover { background: var(--bg2); }

    /* ── TAB BAR ─────────────────────────────────────── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex;
      background: var(--card); border-top: 1px solid var(--separator);
      padding: 8px 0 28px; z-index: 200;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; cursor: pointer; color: var(--secondary-text);
      padding: 4px 0; transition: color .2s;
    }
    .tab.on { color: var(--blue); }
    .tab-icon  { font-size: 23px; }
    .tab-label { font-size: 10px; font-weight: 600; letter-spacing: .1px; }

    /* ── PAGES ───────────────────────────────────────── */
    .page { display: none; padding: 0 16px; }
    .page.on { display: block; }

    /* ── SECTION ROW ─────────────────────────────────── */
    .section-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 4px 0 14px; padding: 0 4px;
    }
    .section-title { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
    .badge-count {
      font-size: 12px; font-weight: 600; color: var(--secondary-text);
      background: var(--bg2); padding: 3px 10px; border-radius: 100px;
    }

    /* ── DAY STRIP ───────────────────────────────────── */
    .day-strip { display: flex; gap: 8px; padding: 0 0 14px; overflow-x: auto; scrollbar-width: none; }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-btn {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 14px; border-radius: var(--radius-sm); background: var(--card); border: none;
      cursor: pointer; transition: all .2s; box-shadow: var(--shadow-sm);
    }
    .day-btn.on { background: var(--blue); }
    .day-lbl { font-size: 10px; font-weight: 700; color: var(--secondary-text); text-transform: uppercase; letter-spacing: .5px; }
    .day-num { font-size: 20px; font-weight: 700; color: var(--primary-text); }
    .day-btn.on .day-lbl, .day-btn.on .day-num { color: #fff; }
    .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
    .day-btn.on .day-dot { background: rgba(255,255,255,.7); }

    /* ── MATCH CARD ──────────────────────────────────── */
    .match-card {
      background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
      box-shadow: var(--shadow-sm); transition: transform .15s;
    }
    .match-card:active { transform: scale(.985); }
    .match-card.is-fav { border-left: 3px solid var(--yellow); padding-left: 13px; }

    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .league-tag { display: flex; align-items: center; gap: 7px; }
    .league-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .league-lbl { font-size: 11px; font-weight: 700; color: var(--secondary-text); text-transform: uppercase; letter-spacing: .6px; }

    .live-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--red); color: #fff; font-size: 10px; font-weight: 800;
      padding: 4px 9px; border-radius: 100px; letter-spacing: .5px;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .time-pill { font-size: 13px; font-weight: 600; color: var(--secondary-text); background: var(--bg); padding: 5px 11px; border-radius: 100px; }
    .fin-pill  { font-size: 12px; font-weight: 600; color: var(--tertiary-text); background: var(--bg); padding: 5px 11px; border-radius: 100px; }

    .teams-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .team-col  { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
    .team-emblem {
      width: 52px; height: 52px; border-radius: 50%; background: var(--bg);
      display: flex; align-items: center; justify-content: center; font-size: 26px; overflow: hidden;
    }
    .team-emblem img { width: 42px; height: 42px; object-fit: contain; }
    .team-name { font-size: 13px; font-weight: 600; text-align: center; max-width: 100px; line-height: 1.25; }

    .center-col { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 10px; flex-shrink: 0; }
    .score-txt  { font-size: 30px; font-weight: 800; letter-spacing: -1.5px; }
    .vs-txt     { font-size: 12px; font-weight: 700; color: var(--tertiary-text); letter-spacing: 1px; }
    .day-small  { font-size: 10px; color: var(--tertiary-text); font-weight: 500; text-align: center; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--separator); gap: 8px; }
    .channel-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .ch-icon { font-size: 14px; flex-shrink: 0; }
    .ch-name { font-size: 12px; font-weight: 600; color: var(--secondary-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .remind-btn {
      display: flex; align-items: center; gap: 5px; background: none;
      border: 1.5px solid var(--blue); color: var(--blue); border-radius: 100px;
      padding: 6px 13px; font-size: 12px; font-weight: 700; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; transition: all .2s;
    }
    .remind-btn.on { background: var(--blue); color: #fff; }
    .remind-btn:active { transform: scale(.94); }

    /* ── EMPTY / LOADING ─────────────────────────────── */
    .placeholder { text-align: center; padding: 60px 20px; }
    .ph-icon  { font-size: 52px; margin-bottom: 14px; }
    .ph-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .ph-body  { font-size: 14px; color: var(--secondary-text); line-height: 1.5; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 60px 0; color: var(--secondary-text); font-size: 14px; font-weight: 500; }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--separator); border-top-color: var(--blue); border-radius: 50%; animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── API STATUS BANNER ───────────────────────────── */
    .api-banner {
      display: none; margin: 0 0 14px; padding: 12px 16px; background: #FFF3CD;
      border-radius: var(--radius-sm); border-left: 4px solid var(--yellow);
      font-size: 13px; font-weight: 500; color: #856404; line-height: 1.4;
    }
    @media (prefers-color-scheme: dark) {
      .api-banner { background: #332700; color: #FFC107; border-color: #FFC107; }
    }
    .api-banner.show { display: block; }

    /* ── TOAST ───────────────────────────────────────── */
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--card); color: var(--primary-text);
      padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg);
      z-index: 9999; transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── OVERLAY / SHEET ─────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 500; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .sheet {
      background: var(--card); border-radius: 24px 24px 0 0; width: 100%;
      max-height: 88vh; overflow-y: auto; padding: 12px 20px 48px;
      transform: translateY(40px); transition: transform .3s cubic-bezier(.32,.72,0,1);
    }
    .overlay.show .sheet { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--separator); border-radius: 100px; margin: 0 auto 20px; }
    .sheet-title  { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sheet-sub    { font-size: 14px; color: var(--secondary-text); margin-bottom: 20px; }

    /* ── TEAMS GRID (modal favoritos) ────────────────── */
    .modal-section-title { font-size: 12px; font-weight: 700; color: var(--secondary-text); text-transform: uppercase; letter-spacing: .7px; margin: 16px 0 10px 2px; }
    .teams-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .team-tile {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 14px 8px 12px; display: flex; flex-direction: column;
      align-items: center; gap: 7px; cursor: pointer;
      border: 2px solid transparent; position: relative; transition: all .18s;
    }
    .team-tile.on { border-color: var(--blue); background: var(--blue-soft); }
    .team-tile:active { transform: scale(.95); }
    .tile-emblem { font-size: 28px; }
    .tile-name   { font-size: 11px; font-weight: 600; text-align: center; line-height: 1.3; color: var(--primary-text); }
    .tile-league { font-size: 10px; color: var(--secondary-text); }
    .tile-check  {
      position: absolute; top: 5px; right: 5px; width: 18px; height: 18px;
      background: var(--blue); border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700;
    }
    .save-btn {
      width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none;
      border-radius: var(--radius-sm); font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 18px; transition: opacity .2s, transform .15s;
    }
    .save-btn:active { opacity: .85; transform: scale(.98); }

    /* ── FAV CHIPS ───────────────────────────────────── */
    .fav-header { font-size: 13px; color: var(--secondary-text); font-weight: 500; padding: 0 4px; margin-bottom: 14px; line-height: 1.5; }
    .fav-chip { display: inline-block; background: var(--blue-soft); color: var(--blue); border-radius: 100px; padding: 2px 9px; font-size: 12px; font-weight: 600; margin: 2px 3px 2px 0; }

    /* ── ERROR CARD ──────────────────────────────────── */
    .error-card {
      background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
      border-left: 3px solid var(--red); box-shadow: var(--shadow-sm); font-size: 13px;
      color: var(--secondary-text);
    }

    /* ── CALENDAR OPTION BUTTONS ─────────────────────── */
    .cal-option-btn {
      width: 100%; display: flex; align-items: center; gap: 14px;
      background: var(--bg); border: none; border-radius: var(--radius-sm);
      padding: 14px 16px; cursor: pointer; margin-bottom: 10px;
      transition: background .15s; text-align: left;
    }
    .cal-option-btn:active { background: var(--bg2); }
    .cal-icon { font-size: 26px; flex-shrink: 0; }
    .cal-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .cal-info strong { font-size: 15px; font-weight: 600; color: var(--primary-text); }
    .cal-info small  { font-size: 12px; color: var(--secondary-text); }
    .cal-arrow-r { font-size: 20px; color: var(--tertiary-text); font-weight: 300; }
    .cal-cancel {
      width: 100%; padding: 14px; background: var(--bg2); border: none;
      border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
      color: var(--secondary-text); cursor: pointer; margin-top: 4px;
      transition: opacity .15s;
    }
    .cal-cancel:active { opacity: .7; }

    /* ── LEAGUE ORDER MODAL ──────────────────────────── */
    .league-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 13px 14px; margin-bottom: 8px; cursor: grab;
      transition: background .15s, opacity .15s;
      border: 2px solid transparent;
    }
    .league-row.dragging { opacity: .5; cursor: grabbing; }
    .league-row.drag-over { border-color: var(--blue); background: var(--blue-soft); }
    .league-drag-handle { font-size: 18px; color: var(--tertiary-text); cursor: grab; user-select: none; }
    .league-row-emoji { font-size: 22px; flex-shrink: 0; }
    .league-row-name  { flex: 1; font-size: 14px; font-weight: 600; }
    .league-pin-btn {
      background: none; border: 2px solid var(--separator); border-radius: 50%;
      width: 32px; height: 32px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0; color: var(--secondary-text);
    }
    .league-pin-btn.on { background: var(--blue-soft); border-color: var(--blue); }

    /* ── DESKTOP LAYOUT ──────────────────────────────── */
    @media (min-width: 768px) {
      body { height: 100vh; overflow: hidden; }

      .app-layout {
        flex-direction: row;
        height: 100vh;
      }

      /* Sidebar: fixed left column */
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--separator);
        background: var(--bg);
        overflow: hidden;
      }

      /* Content area: right scrollable column */
      .content-area {
        flex: 1;
        height: 100vh;
        overflow-y: auto;
        padding: 28px 32px 32px;
      }

      /* Header: no sticky, no phone notch padding */
      .header {
        position: static;
        padding: 28px 20px 10px;
        background: transparent;
        flex-shrink: 0;
      }
      .app-name { font-size: 26px; }
      .app-date  { font-size: 12px; }

      /* Pills: vertical list in sidebar */
      .pills-wrap {
        flex-direction: column;
        align-items: stretch;
        padding: 4px 12px 8px;
        gap: 2px;
        flex: 1;
        overflow-y: auto;
        scrollbar-width: none;
      }
      .pills-wrap::-webkit-scrollbar { display: none; }

      .pills-track {
        flex: none;
        flex-direction: column;
        overflow-x: visible;
        overflow-y: visible;
        padding: 0;
        gap: 2px;
      }

      .pill {
        width: 100%; text-align: left; border-radius: 10px;
        padding: 9px 14px; flex-shrink: 1; white-space: normal;
        box-shadow: none; background: transparent;
        font-size: 13px;
      }
      .pill:hover { background: var(--bg2); }
      .pill.on { background: var(--blue-soft); color: var(--blue); box-shadow: none; }
      .pill.pinned { box-shadow: none; }
      .pill.pinned:not(.on) { font-weight: 700; }

      .league-edit-btn {
        margin: 4px 0 0; padding: 8px 10px;
        align-self: flex-start; font-size: 12px;
        margin-right: 0;
      }

      /* Tab bar: static at bottom of sidebar */
      .tab-bar {
        position: static;
        transform: none;
        left: auto; right: auto;
        flex-direction: column;
        border-top: 1px solid var(--separator);
        padding: 8px 8px 20px;
        margin-top: 0;
        gap: 2px;
        width: 100%;
        flex-shrink: 0;
      }
      .tab {
        flex-direction: row;
        justify-content: flex-start;
        padding: 10px 14px;
        border-radius: 10px;
        gap: 10px;
      }
      .tab.on { background: var(--blue-soft); }
      .tab-label { font-size: 13px; letter-spacing: 0; }
      .tab-icon  { font-size: 20px; }

      /* Pages: no side padding (content-area handles it) */
      .page { padding: 0; }

      /* Section title on desktop: slightly smaller */
      .section-title { font-size: 20px; }

      /* Overlay: centered modal on desktop */
      .overlay { align-items: center; justify-content: center; }
      .sheet {
        border-radius: 24px;
        max-width: 480px;
        transform: scale(.95) translateY(0);
      }
      .overlay.show .sheet { transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <!-- ── SIDEBAR ──────────────────────────────────── -->
    <aside class="sidebar">
      <div class="header">
        <div class="header-row">
          <div>
            <div class="app-name">Sports Clock 🏟️</div>
            <div class="app-date" id="current-date"></div>
          </div>
          <button class="icon-btn" id="fav-open-btn" title="Equipos favoritos">⭐</button>
        </div>
      </div>

      <div class="pills-wrap">
        <div class="pills-track" id="pills-track"></div>
        <button class="league-edit-btn" id="league-edit-btn">⚙️ Ordenar ligas</button>
      </div>

      <nav class="tab-bar" id="tab-bar">
        <button class="tab on" data-tab="hoy">
          <span class="tab-icon">📅</span><span class="tab-label">Hoy</span>
        </button>
        <button class="tab" data-tab="semana">
          <span class="tab-icon">📆</span><span class="tab-label">Semana</span>
        </button>
        <button class="tab" data-tab="favs">
          <span class="tab-icon">⭐</span><span class="tab-label">Favoritos</span>
        </button>
      </nav>
    </aside>

    <!-- ── CONTENT ──────────────────────────────────── -->

<script>
// ═══════════════════════════════════════════════════

const LEAGUES = [

const POPULAR_TEAMS = {

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let allEvents     = [];
let activeLeague  = 'all';
let activeTab     = 'hoy';
let selectedDay   = todayDateStr();
let reminders     = JSON.parse(localStorage.getItem('sc_reminders')     || '{}');

let leagueOrder   = JSON.parse(localStorage.getItem('sc_league_order')  || '[]');
let tmpFavs       = [];
let tmpLeaguePins = [];
let tmpLeagueOrder= [];
let apiErrors     = [];

// Pending calendar event (when user clicks "Recordar")
let calPendingEid = null;
let calPendingBtn = null;

// ═══════════════════════════════════════════════════
//  DATE HELPERS (all Chile TZ)
// ═══════════════════════════════════════════════════
function chileNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Santiago' }));
}
function todayDateStr() {
  const d = chileNow();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function toChileDateStr(utcDate) {
  return utcDate.toLocaleDateString('en-CA', { timeZone: 'America/Santiago' });
}
function fmtTime(utcDate) {
  return utcDate.toLocaleTimeString('es-CL', {
    timeZone: 'America/Santiago', hour:'2-digit', minute:'2-digit', hour12: false
  });
}
function fmtDateShort(utcDate) {
  return utcDate.toLocaleDateString('es-CL', {
    timeZone: 'America/Santiago', weekday:'short', day:'numeric', month:'short'
  });
}
function fmtDateFull(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const s = d.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function espnDateParam(dateStr) {
  return dateStr.replace(/-/g, '');
}

// ═══════════════════════════════════════════════════
//  ESPN API
// ═══════════════════════════════════════════════════
async function fetchESPN(slug, dateStr) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/${slug}/scoreboard?dates=${espnDateParam(dateStr)}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    return j.events || [];
  } catch (e) {
    console.warn(`ESPN fetch failed [${slug}/${dateStr}]:`, e.message);
    return null;
  }
}

function parseESPNEvent(rawEvent, leagueId) {
  const comp     = rawEvent.competitions?.[0];
  const home     = comp?.competitors?.find(c => c.homeAway === 'home');
  const away     = comp?.competitors?.find(c => c.homeAway === 'away');
  const status   = comp?.status?.type;
  const state    = status?.state;
  const finished = status?.completed;
  const utcDate  = new Date(rawEvent.date);
  return {
    _lid:      leagueId,
    _utcDate:  utcDate,
    _dateStr:  toChileDateStr(utcDate),
    id:        rawEvent.id,
    home:      home?.team?.displayName || '—',
    away:      away?.team?.displayName || '—',
    homeLogo:  home?.team?.logo || null,
    awayLogo:  away?.team?.logo || null,
    homeScore: finished ? (home?.score ?? null) : null,
    awayScore: finished ? (away?.score ?? null) : null,
    state,
    finished,
  };
}

async function loadEvents() {
  apiErrors = [];
  showSkeletons();
  const today = chileNow();
  const dates = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
  const fetches = LEAGUES.flatMap(league =>
    dates.map(dateStr =>
      fetchESPN(league.slug, dateStr).then(rawEvents => {
        if (rawEvents === null) { apiErrors.push(league.id); return []; }
        return rawEvents.map(e => parseESPNEvent(e, league.id));
      })
    )
  );
  const results = await Promise.all(fetches);
  allEvents = results
    .flat()
    .filter((e, i, arr) => arr.findIndex(x => x.id === e.id) === i)
    .sort((a, b) => a._utcDate - b._utcDate);
  renderAll();
  scheduleAllNotifications();
}

// ═══════════════════════════════════════════════════
//  LEAGUE ORDERING
// ═══════════════════════════════════════════════════
function getSortedLeagues() {
  let ordered = [...LEAGUES];
  if (leagueOrder.length) {
    ordered.sort((a, b) => {
      const ai = leagueOrder.indexOf(a.id);
      const bi = leagueOrder.indexOf(b.id);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  }
  const pinned = ordered.filter(l => leaguePins.includes(l.id));
  const rest   = ordered.filter(l => !leaguePins.includes(l.id));
  return [...pinned, ...rest];
}

// ═══════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════
function filtered() {
  if (activeLeague === 'all') return allEvents;
  return allEvents.filter(e => e._lid === activeLeague);
}
function eventsForDay(dayStr) {
  return filtered().filter(e => e._dateStr === dayStr);
}

// ═══════════════════════════════════════════════════
//  RENDER: PILLS
// ═══════════════════════════════════════════════════
function buildPills() {
  const track = document.getElementById('pills-track');
  const sorted = getSortedLeagues();
  track.innerHTML =
    `<button class="pill on" data-lid="all">Todos</button>` +
    sorted.map(l => {
      const pin = leaguePins.includes(l.id);
      return `<button class="pill${pin ? ' pinned' : ''}" data-lid="${l.id}">${pin ? '📌 ' : ''}${l.emoji} ${l.name}</button>`;
    }).join('');
  track.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeLeague = btn.dataset.lid;
      track.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      renderAll();
    });
  });
  // Keep active pill highlighted correctly
  const active = track.querySelector(`[data-lid="${activeLeague}"]`);
  if (active) {
    track.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
    active.classList.add('on');
  }
}

// ═══════════════════════════════════════════════════
//  RENDER: MATCH CARD
// ═══════════════════════════════════════════════════
function getLeague(lid) { return LEAGUES.find(l => l.id === lid) || LEAGUES[0]; }

function isFavMatch(ev) {
  return favoriteTeams.some(t =>
    ev.home.toLowerCase().includes(t.toLowerCase()) ||
    ev.away.toLowerCase().includes(t.toLowerCase())
  );
}

function cardHTML(ev) {
  const lg       = getLeague(ev._lid);
  const live     = ev.state === 'in';
  const fin      = ev.finished;
  const hasScore = ev.homeScore !== null;
  const fav      = isFavMatch(ev);
  const reminded = !!reminders[ev.id];

  const homeBadge = ev.homeLogo
    ? `<img src="${ev.homeLogo}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode('${lg.emoji}'))">`
    : lg.emoji;
  const awayBadge = ev.awayLogo
    ? `<img src="${ev.awayLogo}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode('${lg.emoji}'))">`
    : lg.emoji;

  const timePill = live
    ? `<span class="live-pill"><span class="live-dot"></span>EN VIVO</span>`
    : fin
      ? `<span class="fin-pill">Finalizado</span>`
      : `<span class="time-pill">🕐 ${fmtTime(ev._utcDate)}</span>`;

  const centerBlock = hasScore
    ? `<div class="score-txt">${ev.homeScore} – ${ev.awayScore}</div>`
    : `<div class="vs-txt">VS</div><div class="day-small">${fmtDateShort(ev._utcDate)}</div>`;

  const footerRight = fin
    ? ``
    : `<button class="remind-btn ${reminded ? 'on' : ''}"
         data-eid="${ev.id}"
         data-home="${ev.home.replace(/"/g,'&quot;')}"
         data-away="${ev.away.replace(/"/g,'&quot;')}">
         ${reminded ? '🔔 Recordando' : '🔕 Recordar'}
       </button>`;

  return `
    <div class="match-card${fav ? ' is-fav' : ''}">
      <div class="card-top">
        <div class="league-tag">
          <div class="league-dot" style="background:${lg.color}"></div>
          <span class="league-lbl">${lg.full}</span>
          ${fav ? '<span style="font-size:13px;margin-left:2px">⭐</span>' : ''}
        </div>
        ${timePill}
      </div>
      <div class="teams-row">
        <div class="team-col">
          <div class="team-emblem">${homeBadge}</div>
          <div class="team-name">${ev.home}</div>
        </div>
        <div class="center-col">${centerBlock}</div>
        <div class="team-col">
          <div class="team-emblem">${awayBadge}</div>
          <div class="team-name">${ev.away}</div>
        </div>
      </div>
      <div class="card-footer">
        <div class="channel-row">
          <span class="ch-icon">📺</span>
          <span class="ch-name">${lg.channels.join(' · ')}</span>
        </div>
        ${footerRight}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
//  RENDER: PAGES
// ═══════════════════════════════════════════════════
function renderAll() {
  renderHoy();
  if (activeTab === 'semana') renderSemana();
  renderFavs();
}

function renderHoy() {
  const today = todayDateStr();
  const evs   = eventsForDay(today);
  document.getElementById('cnt-hoy').textContent = `${evs.length} partido${evs.length !== 1 ? 's' : ''}`;
  const banner = document.getElementById('banner-hoy');
  if (apiErrors.length > 0) {
    banner.textContent = '⚠️ Algunos datos pueden estar incompletos. La app se actualizará automáticamente.';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
  const list = document.getElementById('list-hoy');
  if (evs.length === 0) {
    list.innerHTML = `<div class="placeholder">
      <div class="ph-icon">😴</div>
      <div class="ph-title">Sin partidos hoy</div>
      <div class="ph-body">No hay partidos programados para hoy en las ligas seleccionadas. ¡Revisa la semana!</div>
    </div>`;
  } else {
    list.innerHTML = evs.map(cardHTML).join('');
  }
  bindReminders(list);
}

function buildDayStrip() {
  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  const today = chileNow();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const hasEvs = allEvents.some(e => e._dateStr === ds);
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (ds === selectedDay ? ' on' : '');
    const dayName = i === 0 ? 'HOY' : d.toLocaleDateString('es-CL', { timeZone:'America/Santiago', weekday:'short' });
    btn.innerHTML = `
      <span class="day-lbl">${dayName}</span>
      <span class="day-num">${d.getDate()}</span>
      <span class="day-dot" style="visibility:${hasEvs ? 'visible' : 'hidden'}"></span>`;
    btn.addEventListener('click', () => {
      selectedDay = ds;
      strip.querySelectorAll('.day-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      renderSemanaDay();
    });
    strip.appendChild(btn);
  }
}

function renderSemana() {
  buildDayStrip();
  renderSemanaDay();
}

function renderSemanaDay() {
  const evs  = eventsForDay(selectedDay);
  document.getElementById('week-title').textContent = fmtDateFull(selectedDay);

  if (evs.length === 0) {
    list.innerHTML = `<div class="placeholder">
      <div class="ph-icon">🗓️</div>
      <div class="ph-title">Sin partidos</div>
      <div class="ph-body">No hay partidos programados para este día en las ligas seleccionadas.</div>
    </div>`;
  } else {
    list.innerHTML = evs.map(cardHTML).join('');
  }
  bindReminders(list);
}

function renderFavs() {
  const container = document.getElementById('list-favs');
  if (favoriteTeams.length === 0) {
    container.innerHTML = `<div class="placeholder">
      <div class="ph-icon">⭐</div>
      <div class="ph-title">Sin equipos favoritos</div>
      <div class="ph-body">Toca el ⭐ arriba para seleccionar tus equipos y ver sus próximos partidos aquí.</div>
    </div>`;
    return;
  }
  const evs  = allEvents.filter(isFavMatch);
  const chips = favoriteTeams.map(t => `<span class="fav-chip">${t}</span>`).join('');
  if (evs.length === 0) {
    container.innerHTML = `<div class="fav-header">Siguiendo: ${chips}</div>
    <div class="placeholder">
      <div class="ph-icon">🔍</div>
      <div class="ph-title">Sin partidos próximos</div>
      <div class="ph-body">No se encontraron partidos próximos para tus equipos en los próximos 7 días.</div>
    </div>`;
    return;
  }
  container.innerHTML = `<div class="fav-header">Siguiendo: ${chips}</div>` + evs.map(cardHTML).join('');
  bindReminders(container);
}

//  CALENDAR: URL GENERATORS
// ═══════════════════════════════════════════════════
function getCalendarEvent(eid) {
  return allEvents.find(e => e.id === eid);
}

function generateGCalUrl(ev) {
  const lg    = getLeague(ev._lid);
  const start = ev._utcDate;
  const end   = new Date(start.getTime() + 2 * 3600 * 1000);
  const fmt   = d => d.toISOString().replace(/[-:.]/g,'').slice(0,15) + 'Z';
  const text  = encodeURIComponent(`${ev.home} vs ${ev.away} — ${lg.full}`);
  const dates = `${fmt(start)}/${fmt(end)}`;
  const detail= encodeURIComponent(`📺 ${lg.channels.join(' · ')}\n🕐 Hora Chile: ${fmtTime(start)}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${dates}&details=${detail}&ctz=America/Santiago`;
}

function generateOutlookUrl(ev) {
  const lg    = getLeague(ev._lid);
  const start = ev._utcDate;
  const end   = new Date(start.getTime() + 2 * 3600 * 1000);
  const toISO = d => d.toISOString().split('.')[0];
  const sub   = encodeURIComponent(`${ev.home} vs ${ev.away} — ${lg.full}`);
  const body  = encodeURIComponent(`📺 ${lg.channels.join(' · ')}\n🕐 Hora Chile: ${fmtTime(start)}`);
  return `https://outlook.live.com/calendar/0/action/compose?subject=${sub}&startdt=${toISO(start)}&enddt=${toISO(end)}&body=${body}`;
}

function downloadICS(ev) {
  const lg    = getLeague(ev._lid);
  const start = ev._utcDate;
  const end   = new Date(start.getTime() + 2 * 3600 * 1000);
  const fmt   = d => d.toISOString().replace(/[-:.]/g,'').slice(0,15) + 'Z';
  const uid   = `sportsclock-${ev.id}@local`;
  const ics   = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Sports Clock//ES',
    'CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `SUMMARY:${ev.home} vs ${ev.away} — ${lg.full}`,
    `DTSTART:${fmt(start)}`,
    `DTEND:${fmt(end)}`,
    `DESCRIPTION:📺 ${lg.channels.join(' · ')}\\n🕐 Hora Chile\\: ${fmtTime(start)}`,
    `LOCATION:${lg.full}`,
    `STATUS:CONFIRMED`,
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `${ev.home}_vs_${ev.away}.ics`.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_.\-]/g,'');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════
//  REMINDERS
// ═══════════════════════════════════════════════════
function bindReminders(root) {
  root.querySelectorAll('.remind-btn').forEach(btn => {
    btn.addEventListener('click', () =>
      toggleReminder(btn.dataset.eid, btn.dataset.home, btn.dataset.away, btn)
    );
  });
}

function toggleReminder(eid, home, away, btn) {
  // If already reminded: toggle off
  if (reminders[eid]) {
    delete reminders[eid];
    localStorage.setItem('sc_reminders', JSON.stringify(reminders));
    toast('🔕 Recordatorio eliminado');
    if (btn) { btn.classList.remove('on'); btn.innerHTML = '🔕 Recordar'; }
    return;
  }

  // Store pending state and open calendar modal
  calPendingEid = eid;
  calPendingBtn = btn;

  const ev = getCalendarEvent(eid);
  const lg = ev ? getLeague(ev._lid) : null;
  document.getElementById('cal-sheet-title').textContent = ev
    ? `${ev.home} vs ${ev.away}`
    : `${home} vs ${away}`;
  document.getElementById('cal-sheet-sub').textContent = ev && lg
    ? `${lg.full} · ${fmtTime(ev._utcDate)} hora Chile`
    : 'Elige tu app de calendario favorita';

  document.getElementById('cal-overlay').classList.add('show');
}

function markReminded(eid) {
  const ev = getCalendarEvent(eid);
  if (!ev) return;
  reminders[eid] = {
    home: ev.home, away: ev.away, iso: ev._utcDate.toISOString(),
    done30: false, doneStart: false
  };
  localStorage.setItem('sc_reminders', JSON.stringify(reminders));
  scheduleAllNotifications();
  if (calPendingBtn) {
    calPendingBtn.classList.add('on');
    calPendingBtn.innerHTML = '🔔 Recordando';
  }
  document.getElementById('cal-overlay').classList.remove('show');
  toast('🔔 ¡Partido agendado!');
  calPendingEid = null;
  calPendingBtn = null;
}

// Calendar modal button bindings
document.getElementById('cal-google').addEventListener('click', () => {
  if (!calPendingEid) return;
  const ev = getCalendarEvent(calPendingEid);
  if (ev) window.open(generateGCalUrl(ev), '_blank');
  markReminded(calPendingEid);
});

document.getElementById('cal-apple').addEventListener('click', () => {
  if (!calPendingEid) return;
  const ev = getCalendarEvent(calPendingEid);
  if (ev) downloadICS(ev);
  markReminded(calPendingEid);
});

document.getElementById('cal-outlook').addEventListener('click', () => {
  if (!calPendingEid) return;
  const ev = getCalendarEvent(calPendingEid);
  if (ev) window.open(generateOutlookUrl(ev), '_blank');
  markReminded(calPendingEid);
});

document.getElementById('cal-cancel').addEventListener('click', () => {
  document.getElementById('cal-overlay').classList.remove('show');
  calPendingEid = null;
  calPendingBtn = null;
});

document.getElementById('cal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cal-overlay')) {
    document.getElementById('cal-overlay').classList.remove('show');
    calPendingEid = null;
    calPendingBtn = null;
  }
});

function scheduleAllNotifications() {
  const now = Date.now();
  Object.entries(reminders).forEach(([eid, r]) => {
    if (!r.iso) return;
    const mt  = new Date(r.iso).getTime();
    const t30 = mt - 30 * 60 * 1000;
    if (!r.done30 && t30 > now && t30 - now < 24 * 3600 * 1000) {
      setTimeout(() => {
        if (Notification.permission === 'granted')
          new Notification('⏰ Partido en 30 minutos', { body: `${r.home} vs ${r.away}` });
        reminders[eid].done30 = true;
        localStorage.setItem('sc_reminders', JSON.stringify(reminders));
      }, t30 - now);
    }
    if (!r.doneStart && mt > now && mt - now < 24 * 3600 * 1000) {
      setTimeout(() => {
        if (Notification.permission === 'granted')
          new Notification('⚽ ¡Comienza ahora!', { body: `${r.home} vs ${r.away} — ¡Está empezando!` });
        reminders[eid].doneStart = true;
        localStorage.setItem('sc_reminders', JSON.stringify(reminders));
      }, mt - now);
    }
  });
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════
document.getElementById('tab-bar').querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById(`page-${activeTab}`).classList.add('on');
    if (activeTab === 'semana') renderSemana();
    if (activeTab === 'favs')   renderFavs();
  });
});

// ═══════════════════════════════════════════════════
//  FAVORITES MODAL (equipos)
// ═══════════════════════════════════════════════════
const favOverlay = document.getElementById('fav-overlay');
document.getElementById('fav-open-btn').addEventListener('click', openFavModal);
favOverlay.addEventListener('click', e => { if (e.target === favOverlay) closeFavModal(); });
document.getElementById('save-favs-btn').addEventListener('click', saveFavs);

function openFavModal() {
  tmpFavs = [...favoriteTeams];
  buildTeamsGrid();
  favOverlay.classList.add('show');
}
function closeFavModal() { favOverlay.classList.remove('show'); }

function buildTeamsGrid() {
  const container = document.getElementById('teams-container');
  container.innerHTML = '';
  Object.entries(POPULAR_TEAMS).forEach(([section, teams]) => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="modal-section-title">${section}</div>`;
    const grid = document.createElement('div');
    grid.className = 'teams-grid';
    teams.forEach(team => {
      const isOn = tmpFavs.includes(team.name);
      const tile = document.createElement('div');
      tile.className = 'team-tile' + (isOn ? ' on' : '');
      tile.innerHTML = `
        <div class="tile-emblem">${team.emoji}</div>
        <div class="tile-name">${team.name}</div>
        <div class="tile-league">${section}</div>
        ${isOn ? '<div class="tile-check">✓</div>' : ''}`;
      tile.addEventListener('click', () => {
        const idx = tmpFavs.indexOf(team.name);
        if (idx >= 0) {
          tmpFavs.splice(idx, 1);
          tile.classList.remove('on');
          tile.querySelector('.tile-check')?.remove();
        } else {
          tmpFavs.push(team.name);
          tile.classList.add('on');
          const chk = document.createElement('div');
          chk.className = 'tile-check'; chk.textContent = '✓';
          tile.appendChild(chk);
        }
      });
      grid.appendChild(tile);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

function saveFavs() {
  favoriteTeams = [...tmpFavs];
  localStorage.setItem('sc_favorites', JSON.stringify(favoriteTeams));
  closeFavModal();
  const n = favoriteTeams.length;
  toast(`⭐ ${n} equipo${n !== 1 ? 's' : ''} guardado${n !== 1 ? 's' : ''}`);
  renderFavs();
}

// ═══════════════════════════════════════════════════
//  LEAGUE ORDER MODAL
// ═══════════════════════════════════════════════════
const leagueOverlay = document.getElementById('league-overlay');
document.getElementById('league-edit-btn').addEventListener('click', openLeagueModal);
leagueOverlay.addEventListener('click', e => { if (e.target === leagueOverlay) leagueOverlay.classList.remove('show'); });
document.getElementById('save-league-btn').addEventListener('click', saveLeagueOrder);

function openLeagueModal() {
  const sorted = getSortedLeagues();
  tmpLeagueOrder = sorted.map(l => l.id);
  tmpLeaguePins  = [...leaguePins];
  buildLeagueList();
  leagueOverlay.classList.add('show');
}

function buildLeagueList() {
  const list = document.getElementById('league-list');
  list.innerHTML = '';

  tmpLeagueOrder.forEach((lid, idx) => {
    const league  = LEAGUES.find(l => l.id === lid);
    if (!league) return;
    const isPinned = tmpLeaguePins.includes(lid);

    const row = document.createElement('div');
    row.className = 'league-row';
    row.draggable = true;
    row.dataset.lid = lid;

    row.innerHTML = `
      <span class="league-drag-handle">⠿</span>
      <span class="league-row-emoji">${league.emoji}</span>
      <span class="league-row-name">${league.full}</span>
      <button class="league-pin-btn ${isPinned ? 'on' : ''}" title="${isPinned ? 'Desfijar' : 'Fijar al inicio'}">
        ${isPinned ? '📌' : '☆'}
      </button>`;

    // Pin toggle
    row.querySelector('.league-pin-btn').addEventListener('click', () => {
      const pinBtn = row.querySelector('.league-pin-btn');
      if (tmpLeaguePins.includes(lid)) {
        tmpLeaguePins = tmpLeaguePins.filter(id => id !== lid);
        pinBtn.classList.remove('on');
        pinBtn.textContent = '☆';
        pinBtn.title = 'Fijar al inicio';
      } else {
        tmpLeaguePins.push(lid);
        pinBtn.classList.add('on');
        pinBtn.textContent = '📌';
        pinBtn.title = 'Desfijar';
      }
    });

    // Drag and drop
    row.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', lid);
      row.classList.add('dragging');
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      list.querySelectorAll('.league-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.league-row').forEach(r => r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const fromId  = e.dataTransfer.getData('text/plain');
      if (fromId === lid) return;
      const fromIdx = tmpLeagueOrder.indexOf(fromId);
      const toIdx   = tmpLeagueOrder.indexOf(lid);
      tmpLeagueOrder.splice(fromIdx, 1);
      tmpLeagueOrder.splice(toIdx, 0, fromId);
      buildLeagueList();
    });

    list.appendChild(row);
  });
}

function saveLeagueOrder() {
  leagueOrder = [...tmpLeagueOrder];
  leaguePins  = [...tmpLeaguePins];
  localStorage.setItem('sc_league_order', JSON.stringify(leagueOrder));
  localStorage.setItem('sc_league_pins',  JSON.stringify(leaguePins));
  buildPills();
  leagueOverlay.classList.remove('show');
  toast('✅ Ligas actualizadas');
}

function setHeaderDate() {
  const d = chileNow();
  const s = d.toLocaleDateString('es-CL', {
    timeZone:'America/Santiago', weekday:'long', day:'numeric', month:'long'
  });
  document.getElementById('current-date').textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

buildPills();
loadEvents();
